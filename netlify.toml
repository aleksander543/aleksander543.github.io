# Netlify config — Megapolis

[build]
  publish = "."
  functions = "netlify/functions"

# Przekieruj wywolania /api/ai-search do Netlify Function
# (zeby kod frontendu zostal bez zmian - dalej woła /api/ai-search)
[[redirects]]
  from = "/api/ai-search"
  to = "/.netlify/functions/ai-search"
  status = 200
  force = true

# Pretty URLs - zeby /o-nas/ zamiast /o-nas/index.html dalej dzialalo
# (Netlify ma to domyslnie, ale explicit nie zaszkodzi)

# Basic security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache media files aggressively (rzadko się zmieniaja)
[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
